<title>Franchise PY – Dashboard KPI</title>
<style>
body { margin: 0; }
#login-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: #f0f2f5;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Segoe UI', system-ui, sans-serif;
}
.login-box {
  background: #fff; border-radius: 16px;
  box-shadow: 0 8px 40px rgba(0,0,0,.12);
  padding: 48px 40px; width: 360px; text-align: center;
}
.login-logo { margin-bottom: 24px; }
.login-logo img { height: 72px; border-radius: 12px; }
.login-title {
  font-size: 1.3rem; font-weight: 700; color: #1a1d2e;
  margin-bottom: 4px;
}
.login-sub { font-size: .85rem; color: #6b7280; margin-bottom: 32px; }
.login-box input[type=password] {
  width: 100%; padding: 12px 16px; border-radius: 8px;
  border: 1.5px solid #dde1ea; font-size: 1rem;
  outline: none; color: #1a1d2e;
  transition: border-color .2s;
  box-sizing: border-box; margin-bottom: 12px;
  letter-spacing: 2px;
}
.login-box input[type=password]:focus { border-color: #27ae60; }
.login-btn {
  width: 100%; padding: 12px; border-radius: 8px;
  background: #27ae60; color: #fff; border: none;
  font-size: 1rem; font-weight: 700; cursor: pointer;
  transition: background .2s;
}
.login-btn:hover { background: #1e8449; }
.login-btn:disabled { opacity: .65; cursor: wait; }
.login-error {
  color: #c0392b; font-size: .82rem; margin-top: 10px;
  min-height: 20px; font-weight: 600;
}
.login-remember {
  display: flex; gap: 7px; justify-content: center; align-items: center;
  margin-top: 10px; font-size: .78rem; color: #6b7280; cursor: pointer;
  user-select: none;
}
.login-remember input { accent-color: #27ae60; }
.login-footer { margin-top: 28px; font-size: .72rem; color: #9ca3af; }
</style>
</head>

const b64 = s => Uint8Array.from(atob(s), c => c.charCodeAt(0));

async function decrypt(pw) {
  const enc = new TextEncoder();
  const keyMat = await crypto.subtle.importKey('raw', enc.encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt:b64(SALT), iterations:ITER, hash:'SHA-256' },
    keyMat, { name:'AES-GCM', length:256 }, false, ['decrypt']);
  const plain = await crypto.subtle.decrypt({ name:'AES-GCM', iv:b64(IV) }, key, b64(DATA));
  return new TextDecoder().decode(plain);
}

async function tryOpen(pw, remember) {
  const btn = document.getElementById('btn');
  btn.disabled = true; btn.textContent = 'Connexion…';
  try {
    const html = await decrypt(pw);
    if (remember) localStorage.setItem('fpy_pw', pw);
    // Sauter l'écran de connexion interne du dashboard (un seul mot de passe)
    try { sessionStorage.setItem('fpy_auth', '1'); } catch (e) {}
    document.open(); document.write(html); document.close();
  } catch (e) {
    localStorage.removeItem('fpy_pw');
    const err = document.getElementById('login-error');
    err.textContent = 'Mot de passe incorrect';
    const inp = document.getElementById('pwd-input');
    inp.value = ''; inp.focus();
    setTimeout(() => err.textContent = '', 3000);
    btn.disabled = false; btn.textContent = 'Connexion';
  }
}

document.getElementById('f').addEventListener('submit', ev => {
  ev.preventDefault();
  tryOpen(document.getElementById('pwd-input').value, document.getElementById('rem').checked);
});

const saved = localStorage.getItem('fpy_pw');
if (saved) tryOpen(saved, true);
</script>
